<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Discern</title>
  </head>
  <body>
    <header>
      <span class="logo">🔍</span>
      <span class="title">Discern</span>
      <span class="provider" id="provider">—</span>
    </header>

    <main>
      <p class="tagline">Sort opinion from fact. Spot the fallacies.</p>

      <button class="primary" id="analyze">⚖️ Analyze this page</button>
      <button class="ghost" id="scan">🔍 Highlight argument language</button>
      <button class="ghost" id="clear">✦ Clear highlights</button>

      <section class="agents">
        <h2>Agents</h2>
        <ul id="agent-list"><li class="muted">Loading…</li></ul>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>

    <footer>
      <button class="link" id="open-options">Settings &amp; API keys ⚙</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
